services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clinic-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - clinic-network

  nginx:
    image: nginx:alpine
    container_name: clinic-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - clinic-network

  mysql:
    image: mysql:8.0
    container_name: clinic-mysql
    environment:
      MYSQL_DATABASE: clinic
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: clinic
    ports:
      - "3306:3306"
    networks:
      - clinic-network

  redis:
    image: redis:alpine
    container_name: clinic-redis
    ports:
      - "6379:6379"
    networks:
      - clinic-network

networks:
  clinic-network:
    driver: bridge
